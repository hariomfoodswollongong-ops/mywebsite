<!DOCTYPE html>
<html>
  <body>
    <!-- Static form skeletons for Netlify Forms build-time detection. Never shown to users. -->
    <form name="order" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <textarea name="order-details"></textarea>
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
